# Minimal tmux config for cms demos.
# Preserves navigation and split bindings; no theme or plugins.

set -g prefix C-s
unbind C-b

set -g base-index 1
set -g escape-time 10
set -g mouse on
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm*:Tc"
set -gq allow-passthrough on
set -g focus-events on
set -g renumber-windows on
set -g history-limit 10000
setw -g aggressive-resize on
setw -g mode-keys vi

# Smart pane switching with awareness of Vim splits.
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

# Splits
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind = select-layout tiled

# Window/session navigation
bind C-c new-session
unbind p
bind p previous-window
bind b run-shell 'tmux switch-client -l 2>/dev/null; tmux last-pane 2>/dev/null'

# Copy mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind P paste-buffer
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# cms bindings
bind C-s display-popup -w 60% -h 80% -E "cms"
bind q   display-popup -w 70% -h 80% -E "cms -q"
bind w   display-popup -w 60% -h 80% -E "cms worktrees"
bind C-n run-shell "cms next"
